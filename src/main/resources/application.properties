# ── Servidor ──
server.port=8080

# ── Nombre de la aplicación ──
spring.application.name=AeroSim

# ── Recursos estáticos (HTML, CSS, JS en src/main/resources/static) ──
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0

# ── Jackson: serializar enums como strings legibles ──
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null

# ── Logging ──
logging.level.co.uptc.airport=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ══ Parámetros de la simulación ══
# Número de pistas de aterrizaje/despegue
airport.num-runways=3

# Número de puertas de embarque
airport.num-gates=5

# Tiempo mínimo de uso de una pista (milisegundos)
airport.tiempo-min-runway-ms=2000

# Tiempo máximo de uso de una pista (milisegundos)
airport.tiempo-max-runway-ms=5000

# Tiempo mínimo de estancia en puerta (milisegundos)
airport.tiempo-min-gate-ms=3000

# Tiempo máximo de estancia en puerta (milisegundos)
airport.tiempo-max-gate-ms=8000

# Intervalo mínimo entre llegadas de aviones en simulación automática (ms)
airport.intervalo-min-llegada-ms=1000

# Intervalo máximo entre llegadas de aviones en simulación automática (ms)
airport.intervalo-max-llegada-ms=3000